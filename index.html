<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Quantarion AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0b1016;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        
        body {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        .mobile-app-frame {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d121a 0%, #1c2533 50%, #0b1016 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        
        /* Header with menu */
        .header-area {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            height: 56px;
            position: relative;
        }
        
        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: #a0a5b0;
            letter-spacing: 0.5px;
        }
        
        .menu-three-dots {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #a0a5b0;
            font-size: 20px;
            transition: all 0.2s ease;
            -webkit-user-select: none;
            user-select: none;
            padding: 0;
            margin: 0;
            position: relative;
        }
        
        .menu-three-dots:active {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(0.95);
        }
        
        /* Dropdown Menu */
        .menu-dropdown {
            position: absolute;
            top: 48px;
            right: 0;
            background: rgba(20, 30, 50, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            min-width: 180px;
            z-index: 999;
            display: none;
            flex-direction: column;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        .menu-dropdown.active {
            display: flex;
        }
        
        .menu-item {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #a0a5b0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        
        .menu-item:active {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }
        
        /* Main content area - welcome screen */
        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        
        .black-outline-logo {
            width: 100px;
            height: auto;
            margin-bottom: 20px;
            opacity: 0.85;
            animation: fadeInScale 0.8s ease-out;
            filter: brightness(0) invert(1) drop-shadow(0 0 15px rgba(0, 0, 0, 0.8));
            background: black;
            padding: 15px;
            border-radius: 12px;
        }
        
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 0.85;
                transform: scale(1);
            }
        }
        
        .main-title {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            line-height: 1.3;
        }
        
        .main-subtitle {
            font-size: 13px;
            color: #a0a5b0;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }
        
        /* Chat display area */
        #chatDisplay {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px;
            display: none;
            color: white;
            width: 100%;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            min-height: 0;
        }
        
        #chatDisplay::-webkit-scrollbar {
            width: 4px;
        }
        
        #chatDisplay::-webkit-scrollbar-track {
            background: transparent;
        }
        
        #chatDisplay::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        
        .chat-msg {
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .chat-msg.user-msg {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.3);
            margin-left: auto;
            max-width: 85%;
        }
        
        .chat-msg.ai-msg {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }
        
        /* Footer - Input area - INSIDE SCREEN */
        .footer-area {
            padding: 12px;
            width: 100%;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .chat-pill-container {
            background: rgba(40, 50, 70, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 6px 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        
        .input-inner-box {
            flex: 1;
            height: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }
        
        .input-inner-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0 6px;
            outline: none;
            font-size: 14px;
            line-height: 1.4;
            min-height: 40px;
        }
        
        .input-inner-box input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .input-inner-box input:focus::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        
        .send-pill {
            height: 40px;
            width: 40px;
            min-width: 40px;
            background: #22c55e;
            border-radius: 30px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            -webkit-user-select: none;
            user-select: none;
            padding: 0;
            margin: 0;
        }
        
        .send-pill:active {
            background: #16a34a;
            transform: scale(0.95);
        }
        
        /* History Modal */
        #historyOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1001;
            padding: 20px;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .history-modal {
            background: rgba(20, 30, 50, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 340px;
            backdrop-filter: blur(20px);
            margin-top: 20px;
        }
        
        .history-title {
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #a0a5b0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .history-item:active {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }
        
        .history-empty {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            padding: 20px;
            font-size: 13px;
        }
        
        .history-close-btn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .history-close-btn:active {
            background: rgba(255, 255, 255, 0.15);
        }
        
        /* Settings Modal */
        #settingsOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            padding: 20px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .settings-modal {
            background: rgba(20, 30, 50, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px 20px;
            width: 100%;
            max-width: 340px;
            backdrop-filter: blur(20px);
        }
        
        .settings-title {
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .settings-modal input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .settings-modal input:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(34, 197, 94, 0.5);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
        }
        
        .settings-modal input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .settings-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        
        .settings-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .settings-btn.save {
            background: #22c55e;
            color: black;
        }
        
        .settings-btn.save:active {
            background: #16a34a;
            transform: scale(0.98);
        }
        
        .settings-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .settings-btn.cancel:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.98);
        }
        
        /* Loading indicator */
        .loading {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 1.5s infinite;
            margin-right: 6px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="mobile-app-frame">
        <header class="header-area">
            <span class="header-title">Quantarion</span>
            <div style="position: relative;">
                <button class="menu-three-dots" onclick="toggleMenu()">⋮</button>
                <div class="menu-dropdown" id="menuDropdown">
                    <div class="menu-item" onclick="newChat()">➕ New Chat</div>
                    <div class="menu-item" onclick="openHistory()">📋 Chat History</div>
                    <div class="menu-item" onclick="openSettings()">⚙️ Settings</div>
                </div>
            </div>
        </header>

        <main class="center-stage" id="welcomeScreen">
            <img src="https://i.ibb.co/zVHRTfTF/1776703207500-1.jpg" class="black-outline-logo" alt="Quantarion Logo">
            <h1 class="main-title">Welcome to<br><strong>Quantarion</strong> V1.0</h1>
            <p class="main-subtitle">AI at your fingertips</p>
        </main>
        
        <div id="chatDisplay"></div>

        <footer class="footer-area">
            <div class="chat-pill-container">
                <div class="input-inner-box">
                    <input type="text" id="aiInput" placeholder="Type command...">
                </div>
                <button class="send-pill" id="sendBtn" onclick="sendMessage()">↑</button>
            </div>
        </footer>
    </div>

    <!-- History Modal -->
    <div id="historyOverlay" onclick="if(event.target === this) closeHistory()">
        <div class="history-modal">
            <h2 class="history-title">📋 Chat History</h2>
            <div class="history-list" id="historyList">
                <div class="history-empty">No chat history yet</div>
            </div>
            <button class="history-close-btn" onclick="closeHistory()">Close</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsOverlay" onclick="if(event.target === this) closeSettings()">
        <div class="settings-modal">
            <h2 class="settings-title">⚙️ Settings</h2>
            <input type="password" id="apiKey" placeholder="OpenRouter API Key">
            <input type="text" id="modelName" value="deepseek/deepseek-r1:free" placeholder="Model name">
            <div class="settings-buttons">
                <button class="settings-btn cancel" onclick="closeSettings()">Cancel</button>
                <button class="settings-btn save" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentChatId = null;
        let allChats = {};

        // Mobile-first initialization
        window.addEventListener('load', () => {
            // Load saved settings
            const savedKey = localStorage.getItem('q_key');
            const savedModel = localStorage.getItem('q_model');
            if(savedKey) document.getElementById('apiKey').value = savedKey;
            if(savedModel) document.getElementById('modelName').value = savedModel;
            
            // Load chat history
            const savedChats = localStorage.getItem('q_chats');
            if(savedChats) {
                allChats = JSON.parse(savedChats);
            }
            
            // Enter key to send
            document.getElementById('aiInput').addEventListener('keypress', (e) => {
                if(e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });

        function toggleMenu() {
            const menu = document.getElementById('menuDropdown');
            menu.classList.toggle('active');
        }

        function closeMenuAndOverlay() {
            document.getElementById('menuDropdown').classList.remove('active');
        }

        function newChat() {
            closeMenuAndOverlay();
            currentChatId = Date.now().toString();
            allChats[currentChatId] = { messages: [], timestamp: new Date().toLocaleString() };
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('chatDisplay').style.display = 'none';
            document.getElementById('chatDisplay').innerHTML = '';
            document.getElementById('aiInput').value = '';
            document.getElementById('aiInput').focus();
        }

        function openHistory() {
            closeMenuAndOverlay();
            document.getElementById('historyOverlay').style.display = 'flex';
            updateHistoryList();
        }

        function closeHistory() {
            document.getElementById('historyOverlay').style.display = 'none';
        }

        function updateHistoryList() {
            const historyList = document.getElementById('historyList');
            if(Object.keys(allChats).length === 0) {
                historyList.innerHTML = '<div class="history-empty">No chat history yet</div>';
                return;
            }

            historyList.innerHTML = Object.entries(allChats)
                .sort((a, b) => parseInt(b[0]) - parseInt(a[0]))
                .map(([id, chat]) => `
                    <div class="history-item" onclick="loadChat('${id}')">
                        ${chat.messages[0]?.content?.substring(0, 40) || 'Empty Chat'} - ${chat.timestamp}
                    </div>
                `).join('');
        }

        function loadChat(chatId) {
            currentChatId = chatId;
            const chat = allChats[chatId];
            
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatDisplay').style.display = 'block';
            document.getElementById('chatDisplay').innerHTML = '';

            // Reload all messages
            chat.messages.forEach(msg => {
                const msgEl = document.createElement('div');
                msgEl.className = `chat-msg ${msg.role === 'user' ? 'user-msg' : 'ai-msg'}`;
                msgEl.textContent = (msg.role === 'user' ? 'You: ' : '🤖 Quantarion: ') + msg.content;
                document.getElementById('chatDisplay').appendChild(msgEl);
            });

            document.getElementById('chatDisplay').scrollTop = document.getElementById('chatDisplay').scrollHeight;
            document.getElementById('aiInput').value = '';
            document.getElementById('aiInput').focus();
            closeHistory();
        }

        function openSettings() {
            closeMenuAndOverlay();
            document.getElementById('settingsOverlay').style.display = 'flex';
            document.getElementById('apiKey').focus();
        }

        function closeSettings() {
            document.getElementById('settingsOverlay').style.display = 'none';
        }

        function saveSettings() {
            const key = document.getElementById('apiKey').value;
            const model = document.getElementById('modelName').value;
            
            if(!key.trim()) {
                alert('Please enter API Key!');
                return;
            }
            
            localStorage.setItem('q_key', key);
            localStorage.setItem('q_model', model);
            closeSettings();
            alert('Settings saved!');
        }

        async function sendMessage() {
            const input = document.getElementById('aiInput');
            const text = input.value.trim();
            
            if(!text) return;
            
            const key = localStorage.getItem('q_key');
            if(!key) {
                alert('⚠️ Security: Set API Key in Settings first!');
                openSettings();
                return;
            }

            // Create new chat if none exists
            if(!currentChatId) {
                currentChatId = Date.now().toString();
                allChats[currentChatId] = { messages: [], timestamp: new Date().toLocaleString() };
            }
            
            // Show welcome screen once
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatDisplay').style.display = 'block';
            
            // Add user message
            const chatDisplay = document.getElementById('chatDisplay');
            const userMsg = document.createElement('div');
            userMsg.className = 'chat-msg user-msg';
            userMsg.textContent = 'You: ' + text;
            chatDisplay.appendChild(userMsg);
            
            allChats[currentChatId].messages.push({ role: 'user', content: text });
            
            input.value = '';
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            
            // Show loading
            const aiMsg = document.createElement('div');
            aiMsg.className = 'chat-msg ai-msg';
            aiMsg.innerHTML = '<span class="loading"></span>Quantarion thinking...';
            chatDisplay.appendChild(aiMsg);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: localStorage.getItem('q_model') || "deepseek/deepseek-r1:free",
                        messages: [{role: "user", content: text}],
                        stream: false
                    })
                });
                
                const data = await res.json();
                
                if(!data.choices || !data.choices[0] || !data.choices[0].message) {
                    throw new Error(data.error?.message || 'Invalid response');
                }
                
                const response = data.choices[0].message.content;
                aiMsg.innerHTML = '🤖 Quantarion: ' + response;
                allChats[currentChatId].messages.push({ role: 'assistant', content: response });
                
            } catch(error) {
                aiMsg.innerHTML = '❌ Error: ' + (error.message || 'Failed to get response');
                console.error('Error:', error);
            }
            
            // Save chat history
            localStorage.setItem('q_chats', JSON.stringify(allChats));
            
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            input.focus();
        }
        
        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.menu-three-dots') && !e.target.closest('.menu-dropdown')) {
                closeMenuAndOverlay();
            }
        });

        // Prevent double-tap zoom
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
