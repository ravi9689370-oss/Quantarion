<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantarion AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0b1016; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
        
        .mobile-app-frame { width: 100%; max-width: 400px; height: 100%; background: radial-gradient(circle at center 35%, #1c2533 0%, #0d121a 100%); display: flex; flex-direction: column; justify-content: space-between; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .header-area { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .menu-dots-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #a0a5b0; }
        
        .center-stage { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 20px; margin-top: -30px; }
        .black-outline-logo { width: 130px; margin-bottom: 25px; mix-blend-mode: multiply; opacity: 0.75; }
        .main-title { font-size: 20px; color: #ffffff; margin-bottom: 6px; }
        
        #chatDisplay { flex: 1; overflow-y: auto; padding: 20px; display: none; color: white; width: 100%; }
        .chat-msg { padding: 10px; border-radius: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); }

        .footer-area { padding: 0 15px 25px 15px; width: 100%; }
        .chat-pill-container { background: rgba(40, 50, 70, 0.35); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 40px; padding: 6px; display: flex; align-items: center; gap: 8px; }
        .input-inner-box { flex: 1; height: 44px; background: rgba(0, 0, 0, 0.3); border-radius: 30px; display: flex; align-items: center; padding: 0 12px; }
        .input-inner-box input { flex: 1; background: transparent; border: none; color: white; padding: 0 10px; outline: none; }
        .send-pill { height: 44px; padding: 0 20px; background: #22c55e; border-radius: 30px; color: black; font-weight: bold; cursor: pointer; border: none; }

        /* Settings Modal */
        #settingsOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; flex-direction: column; justify-content: center; }
    </style>
</head>
<body>

    <div class="mobile-app-frame">
        <header class="header-area">
            <button class="menu-dots-btn" onclick="document.getElementById('settingsOverlay').style.display='flex'">⚙️</button>
        </header>

        <main class="center-stage" id="welcomeScreen">
            <img src="https://i.ibb.co/zVHRTfTF/1776703207500-1.jpg" class="black-outline-logo">
            <h1 class="main-title">Welcome to <strong>Quantarion</strong> V1.0.</h1>
        </main>
        <div id="chatDisplay"></div>

        <footer class="footer-area">
            <div class="chat-pill-container">
                <div class="input-inner-box">
                    <input type="text" id="aiInput" placeholder="Type command...">
                </div>
                <button class="send-pill" id="sendBtn">Send</button>
            </div>
        </footer>
    </div>

    <div id="settingsOverlay">
        <input type="password" id="apiKey" placeholder="OpenRouter API Key" style="padding:15px; margin-bottom:10px; border-radius:10px;">
        <input type="text" id="modelName" value="deepseek/deepseek-r1:free" style="padding:15px; margin-bottom:10px; border-radius:10px;">
        <button onclick="saveSettings()" style="padding:15px; background:#22c55e; border-radius:10px; cursor:pointer;">Save & Close</button>
    </div>

    <script>
        function saveSettings() {
            localStorage.setItem('q_key', document.getElementById('apiKey').value);
            localStorage.setItem('q_model', document.getElementById('modelName').value);
            document.getElementById('settingsOverlay').style.display = 'none';
        }

        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('aiInput');
            const key = localStorage.getItem('q_key');
            if(!key) return alert("Security: Set API Key in Settings!");
            
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatDisplay').style.display = 'block';
            document.getElementById('chatDisplay').innerHTML += `<div class="chat-msg">User: ${input.value}</div>`;

            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: localStorage.getItem('q_model') || "deepseek/deepseek-r1:free",
                    messages: [{role: "user", content: input.value}],
                    stream: false
                })
            });
            const data = await res.json();
            document.getElementById('chatDisplay').innerHTML += `<div class="chat-msg" style="color:#22c55e">Quantarion: ${data.choices[0].message.content}</div>`;
            input.value = "";
        };
    </script>
</body>
</html>
