<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantarion AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1016; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex flex-col h-full">

    <header class="p-4 flex justify-between items-center glass">
        <h1 class="text-green-400 font-bold">Quantarion V1.0</h1>
        <button id="settingsBtn" class="p-2">⚙️</button>
    </header>

    <div id="chatArea" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="text-center text-gray-500 mt-10">Quantarion Ready. Send a command.</div>
    </div>

    <footer class="p-4 glass">
        <div class="flex gap-2">
            <input id="userInput" type="text" placeholder="Type here..." class="flex-1 bg-black p-3 rounded-full border border-gray-700 outline-none">
            <button id="sendBtn" class="bg-green-600 px-6 rounded-full font-bold">Send</button>
        </div>
    </footer>

    <script>
        const chatArea = document.getElementById('chatArea');
        const input = document.getElementById('userInput');
        
        // 1. Settings (API Key Save)
        document.getElementById('settingsBtn').onclick = () => {
            const key = prompt("Enter OpenRouter API Key:", localStorage.getItem('q_key') || "");
            if(key) localStorage.setItem('q_key', key);
        };

        // 2. Send Message Logic
        document.getElementById('sendBtn').onclick = async () => {
            const text = input.value;
            if(!text) return;
            const key = localStorage.getItem('q_key');
            if(!key) return alert("Please set API Key first!");

            chatArea.innerHTML += `<div class="bg-green-900 p-3 rounded-xl self-end ml-auto max-w-[80%]">${text}</div>`;
            input.value = "";

            const aiResponseDiv = document.createElement('div');
            aiResponseDiv.className = "bg-gray-800 p-3 rounded-xl max-w-[80%]";
            chatArea.appendChild(aiResponseDiv);

            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "deepseek/deepseek-r1:free",
                    messages: [{role: "user", content: text}],
                    stream: true
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            while(true) {
                const {done, value} = await reader.read();
                if(done) break;
                const chunk = decoder.decode(value);
                aiResponseDiv.innerHTML += chunk.replace(/data: /g, "").split('"content":"')[1]?.split('"')[0] || "";
            }
        };
    </script>
</body>
</html>
