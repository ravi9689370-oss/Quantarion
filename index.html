<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantarion AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b1016; color: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        body { background-color: #0b1016; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(40, 50, 70, 0.35); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .chat-msg { max-width: 90%; padding: 12px 16px; border-radius: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loading">Loading Quantarion...</div>

    <div id="app" class="flex flex-col h-screen w-full max-w-2xl mx-auto hidden">
        <header class="p-4 flex justify-between items-center glass">
            <h1 class="text-lg font-semibold text-green-400">Quantarion V1.0</h1>
            <button onclick="openSettings()" class="p-2 bg-white/10 rounded-lg">⚙️</button>
        </header>

        <main id="chatArea" class="flex-1 overflow-y-auto p-4 space-y-4"></main>

        <footer class="p-4 glass">
            <div class="flex items-center gap-2">
                <input id="aiInput" type="text" placeholder="Ask anything..." class="flex-1 bg-black/30 text-white rounded-full px-5 py-3 outline-none border border-white/10">
                <button id="sendBtn" class="bg-green-500 text-black px-6 py-3 rounded-full font-bold">Send</button>
            </div>
        </footer>
    </div>

    <div id="settings" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-50">
        <div class="bg-slate-900 p-6 rounded-2xl w-full max-w-sm border border-white/10">
            <h2 class="text-xl mb-4">Settings</h2>
            <input type="password" id="apiKey" placeholder="OpenRouter API Key" class="w-full bg-black/50 p-2 rounded mb-3 border border-white/10">
            <input type="text" id="modelName" placeholder="Model (e.g. deepseek/deepseek-r1)" value="deepseek/deepseek-r1:free" class="w-full bg-black/50 p-2 rounded mb-4 border border-white/10">
            <button onclick="saveSettings()" class="w-full bg-green-500 py-2 rounded">Save & Close</button>
        </div>
    </div>

    <script>
        // Init
        window.onload = () => { document.getElementById('loading').style.display = 'none'; document.getElementById('app').classList.remove('hidden'); };

        const chatArea = document.getElementById('chatArea');
        const input = document.getElementById('aiInput');
        
        function openSettings() { document.getElementById('settings').classList.remove('hidden'); }
        function saveSettings() { 
            localStorage.setItem('q_key', document.getElementById('apiKey').value);
            localStorage.setItem('q_model', document.getElementById('modelName').value);
            document.getElementById('settings').classList.add('hidden');
        }

        document.getElementById('sendBtn').onclick = async () => {
            const text = input.value;
            if(!text) return;
            
            const key = localStorage.getItem('q_key');
            if(!key) return alert("Set API Key first!");

            chatArea.innerHTML += `<div class="chat-msg bg-green-500/20 self-end ml-auto">${text}</div>`;
            input.value = "";
            
            const aiDiv = document.createElement('div');
            aiDiv.className = "chat-msg bg-white/10 self-start";
            chatArea.appendChild(aiDiv);

            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: localStorage.getItem('q_model') || "deepseek/deepseek-r1:free",
                    messages: [{role: "user", content: text}],
                    stream: true
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            while(true) {
                const {done, value} = await reader.read();
                if(done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                lines.forEach(line => {
                    if(line.startsWith('data: ') && line !== 'data: [DONE]') {
                        const json = JSON.parse(line.substring(6));
                        const content = json.choices[0].delta.content;
                        if(content) aiDiv.innerHTML += content;
                    }
                });
            }
        }
    </script>
</body>
  </html>
